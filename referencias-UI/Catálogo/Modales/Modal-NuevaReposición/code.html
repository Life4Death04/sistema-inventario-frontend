</div>

<div class="relative">

<option value="farma">FarmaLogistics Corp</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-text-secondary">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</div>

<button class="text-text-muted hover:text-error transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[20px]">delete</span>

</tr>
