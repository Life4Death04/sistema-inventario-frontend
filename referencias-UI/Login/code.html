<!DOCTYPE html><html class="light" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>High Meds C.A. - Inicio de Sesión</title>

                extend: {

                    borderRadius: {

                    spacing: {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom input styles for forms plugin compatibility */
        .form-input-pharma {
            @apply block w-full rounded border-border-hairline bg-surface px-4 py-2 text-on-surface shadow-sm focus:border-primary focus:ring focus:ring-primary/20 focus:ring-opacity-50 transition-colors duration-200 font-body-md text-body-md;
        }
        .form-input-pharma::placeholder {
            @apply text-text-muted;
        }
    </style>
</head>
<body class="bg-page-bg min-h-screen flex items-center justify-center font-sans antialiased text-on-surface">
<!-- Linear/Transactional Page -> No Global Navigation Shell (SideNavBar/TopAppBar omitted) -->
<main class="w-full max-w-[360px] px-margin-mobile flex flex-col items-center justify-center">
<!-- Login Card -->
<div class="w-full bg-surface border border-border-hairline rounded-[12px] p-[32px] flex flex-col items-center">
<!-- Header -->
<div class="flex flex-col items-center mb-8 text-center">
<div class="w-[52px] h-[52px] bg-teal-bg rounded-[12px] flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-[28px] text-[#0F6E56]" style="font-variation-settings: 'FILL' 1;">
                        prescriptions
                    </span>
</div>
<h1 class="font-headline-sm text-headline-sm text-primary mb-1">High Meds C.A.</h1>
<p class="font-body-sm text-body-sm text-text-secondary">Sistema de gestión de inventario</p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-5">
<!-- Email Field -->
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-text-secondary sr-only" for="email">Correo electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[20px]">
                                mail
                            </span>
</div>
<input class="form-input-pharma pl-10 h-[44px]" id="email" name="email" placeholder="Correo electrónico" required="" type="email" value="l.ferrer@highmeds.com">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-text-secondary sr-only" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[20px]">
                                lock
                            </span>
</div>
<input class="form-input-pharma pl-10 pr-10 h-[44px]" id="password" name="password" placeholder="Contraseña" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-muted hover:text-primary focus:outline-none transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">
                                visibility_off
                            </span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end w-full mt-[-8px]">
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container transition-colors duration-200" href="#">
                        ¿Olvidaste tu contraseña?
                    </a>
</div>
<!-- Submit Button -->
<button class="w-full h-[40px] bg-primary-container hover:bg-primary text-on-primary font-body-md text-body-md font-medium rounded-[8px] flex items-center justify-center transition-colors duration-200 mt-2 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface" type="submit">
                    Iniciar sesión
                </button>
</form>
</div>
<!-- Footer Footer -->
<footer class="mt-8 text-center">
<p class="font-body-sm text-[11px] leading-4 text-text-muted">
                Aragua de Maturín, Monagas · Acceso restringido
            </p>
</footer>
</main>
</body></html>
